<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Piano Intonation Systems - 2 Octave MIDI</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: sans-serif;
    background:#222; color:#eee;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; margin:0;
    padding: 30px 20px;
  }
  
  /* --- New Dashboard Layout --- */
  .dashboard {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 930px; /* Matches the 15 white keys (15 * 60 = 900 + padding) */
    background: #333;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    padding: 0 20px;
  }
  .panel:not(:last-child) {
    border-right: 1px solid #555;
  }
  .panel h3 { margin: 0; font-size: 1.1em; color: #aaa; text-transform: uppercase; }
  
  /* --- Form Controls --- */
  input[type="text"] { font-size: 1em; width: 100%; padding: 6px; text-align: center; }
  select, button { font-size: 1em; padding: 6px; cursor: pointer; width: 100%; }
  .btn-group { display: flex; gap: 10px; }
  .btn-group button { flex: 1; margin: 0; }
  
  .slider-group { display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
  .slider-group input { flex: 1; }
  
  /* Grid for Overtone Sliders */
  .overtone-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 15px;
    row-gap: 6px;
  }

  /* --- Keyboard (Unchanged Math) --- */
  .keyboard { 
    position:relative; 
    display:flex; 
    align-items: flex-start;
    background: #000;
    margin-bottom: 30px;
  }
  .key.white {
    width:60px; height:220px;
    background:#fff; border:0.5px solid #000; border-radius:0 0 6px 6px;
    display:flex; justify-content:center; align-items:flex-end; font-size:12px;
    cursor:pointer; user-select:none; color:#000;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .key.white.pressed { background:#ddd; }
  .key.black {
    position:absolute; width:40px; height:140px;
    background:#000; border-radius:0 0 4px 4px; color:#eee;
    z-index:2; cursor:pointer; user-select:none;
    display:flex; justify-content:center; align-items:flex-end; font-size:12px;
    border: 1px solid #333;
  }
  .key.black.pressed { background:#444; }
  .key-label { pointer-events: none; padding-bottom: 10px; text-align: center; }
  
  /* --- Chorale Image --- */
  .image-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    margin-top: 10px;
  }
  .image-container img {
    width: 100%;
    display: block;
  }
  .overlay {
    position: absolute;
    top: 0%;   
    left: 6%;  
    width: 0%; 
    height: 100%;
    background: rgba(255,255,0,0.4);
  }
</style>
</head>
<body>

<div class="dashboard">
  <div class="panel">
    <h3>Manual Test</h3>
    <input type="text" id="frequencyInput" placeholder="Enter frequency (Hz)">
    <div class="btn-group">
      <button id="frequencyStart">Start</button>
      <button id="frequencyStop">Stop</button>
    </div>
  </div>

  <div class="panel">
    <h3>Settings</h3>
    <select id="wave">
      <option value="sine">Sine Wave</option>
      <option value="triangle">Triangle Wave</option>
      <option value="sawtooth">Sawtooth Wave</option>
      <option value="square">Square Wave</option>
    </select>
    <select id="temperament">
      <option value="equal">Equal Temperament</option>
      <option value="just">Just Intonation</option>
      <option value="meantone">Meantone Temperament</option>
      <option value="pythagorean">Pythagorean Intonation</option>
    </select>
    <button id="toggleChorale">Hide Chorale Image</button>
  </div>

  <div class="panel">
    <h3>Harmonic Mix</h3>
    <div class="slider-group">
      <label>Vol:</label>
      <input type="range" id="gainSel" min="0" max=".5" step="0.01" value=".25">
    </div>
    <select id="presetSelect">
      <option value="default">Default Mix</option>
      <option value="pure">Pure (1f only)</option>
      <option value="clarinet">Clarinet (Odd harmonics)</option>
      <option value="organ">Drawbar Organ</option>
      <option value="custom">Custom</option>
    </select>
    
    <div class="overtone-grid">
      <div class="slider-group"><label>1f:</label> <input type="range" id="f1" min="0" max="1" step="0.01" value="1"></div>
      <div class="slider-group"><label>5f:</label> <input type="range" id="f5" min="0" max="1" step="0.01" value=".2"></div>
      <div class="slider-group"><label>2f:</label> <input type="range" id="f2" min="0" max="1" step="0.01" value=".5"></div>
      <div class="slider-group"><label>6f:</label> <input type="range" id="f6" min="0" max="1" step="0.01" value=".17"></div>
      <div class="slider-group"><label>3f:</label> <input type="range" id="f3" min="0" max="1" step="0.01" value=".33"></div>
      <div class="slider-group"><label>7f:</label> <input type="range" id="f7" min="0" max="1" step="0.01" value=".15"></div>
      <div class="slider-group"><label>4f:</label> <input type="range" id="f4" min="0" max="1" step="0.01" value=".25"></div>
      <div class="slider-group"><label>8f:</label> <input type="range" id="f8" min="0" max="1" step="0.01" value=".13"></div>
    </div>
  </div>
</div>

<div id="keyboard" class="keyboard"></div>

<div class="image-container" id="choraleContainer">
  <img src="chorale.jpg" alt="Background">
  <div class="overlay"></div>
</div>

<script>
const AudioContext = window.AudioContext||window.webkitAudioContext;
const ctx = new AudioContext();
const baseFreq = 261.63; // C4
const keyMap = ['z','s','x','d','c','v','g','b','h','n','j','m',',','q','w','e','r','t','y','u','i','o'];
const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const keyboard = document.getElementById('keyboard');
const active = new Map();
const keysDown = new Set();
const chordsDown = new Set();
let frequencies = [];

// --- KEYBOARD GENERATION ---
function octave(o) {
  let q = Math.floor(o / 12);
  let r = o - 12 * q;
  if (r < 0) { r += 12; q -= 1; }
  return { quotient: q, remainder: r };
}

function createKeyboard() {
  keyboard.innerHTML = '';
  const whiteOrder = [0, 2, 4, 5, 7, 9, 11];

  // 1. Create White Keys
  for (let offset = -12; offset <= 12; offset++) {
    const { remainder } = octave(offset);
    if (whiteOrder.includes(remainder)) {
      const div = document.createElement('div');
      div.className = 'key white';
      div.dataset.offset = offset;
      const label = (offset >= 0 && offset <= 12) ? keyMap[offset].toUpperCase() : '';
      div.innerHTML = `<div class="key-label"><div style="font-size:11px">${label}</div><div style="font-size:16px; font-weight:bold">${noteNames[remainder]}</div></div>`;
      keyboard.appendChild(div);
    }
  }

  // 2. Create Black Keys with Dynamic Positioning
  const whiteKeyElements = document.querySelectorAll('.key.white');
  const whiteKeyWidth = whiteKeyElements[0].getBoundingClientRect().width;
  let whiteKeyIndex = 0;

  for (let offset = -12; offset <= 11; offset++) {
    const { remainder } = octave(offset);
    const isWhite = whiteOrder.includes(remainder);
    if (isWhite) {
      whiteKeyIndex++;
    } else {
      const div = document.createElement('div');
      div.className = 'key black';
      div.dataset.offset = offset;
      const exactLeft = (whiteKeyIndex * whiteKeyWidth) - 20;
      div.style.left = exactLeft + 'px';
      const label = (offset >= 0 && offset <= 12) ? keyMap[offset].toUpperCase() : '';
      div.innerHTML = `<div class="key-label"><div style="font-size:11px">${label}</div><div style="font-size:16px; font-weight:bold">${noteNames[remainder]}</div></div>`;
      keyboard.appendChild(div);
    }
  }
}

// --- AUDIO LOGIC ---
function freq(offset, temperament){
  const {quotient, remainder} = octave(offset);
  switch (temperament) {
    case 'equal': return baseFreq*Math.pow(2,offset/12); 
    case 'meantone':
      const meantoneRatios = [1, 1.070, 1.118, 1.196, 1.250, 1.337, 1.398, 1.495, 1.600, 1.672, 1.789, 1.869, 2.000];
      return baseFreq*meantoneRatios[remainder]*Math.pow(2,quotient);
    case 'just':
      const justRatios = [1,1.042, 1.125, 1.200, 1.250, 1.333, 1.406, 1.500, 1.600, 1.667, 1.800, 1.875, 2.000];
      return baseFreq*justRatios[remainder]*Math.pow(2,quotient);
    case 'pythagorean':
      const pythRatios = [1, 1.053497942, 1.125, 1.185185185, 1.265625, 1.333333333, 1.423828125, 1.5, 1.580246914, 1.6875, 1.777777778, 1.8984375, 2.0];
      return baseFreq*pythRatios[remainder]*Math.pow(2,quotient);
    case 'frequency': return offset;
  }
}

const overtoneIDs = ['f1','f2','f3','f4','f5','f6','f7','f8'];
const ATTACK=0.01, RELEASE=0.25;

function start(o, temperament){
  if(active.has(o)) return;
  if(ctx.state==='suspended') ctx.resume();
  let g = ctx.createGain();
  const overtoneAmps = overtoneIDs.map(id => Number(document.getElementById(id).value));
  const master = parseFloat(document.getElementById('gainSel').value);
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(master,ctx.currentTime+ATTACK);

  const oscillators = [];
  const fundamental = freq(o, temperament);
  for (const [i, relGain] of overtoneAmps.entries()) {
    const osc = ctx.createOscillator();
    osc.type = document.getElementById('wave').value;
    osc.frequency.value = (i+1) * fundamental;
    const og = ctx.createGain();
    og.gain.value = relGain;
    osc.connect(og).connect(g);
    osc.start();
    oscillators.push({osc,og});
  }
  g.connect(ctx.destination);
  active.set(o,{oscillators,g});
  press(o,true);
}

function stop(o) {
  const n = active.get(o);
  if (!n) return;
  const t = ctx.currentTime;
  n.g.gain.cancelScheduledValues(t);
  n.g.gain.setValueAtTime(n.g.gain.value, t);
  n.g.gain.linearRampToValueAtTime(0, t + RELEASE);
  n.oscillators.forEach(({ osc }) => osc.stop(t + RELEASE + 0.02));
  setTimeout(() => {
    try {
      n.oscillators.forEach(({ osc, og }) => { osc.disconnect(); og.disconnect(); });
      n.g.disconnect();
    } catch (e) {}
  }, (RELEASE + 0.1) * 1000);
  active.delete(o);
  press(o, false);
}

function press(o,on){
  document.querySelectorAll(`.key[data-offset="${o}"]`).forEach(el=>el.classList.toggle('pressed',on));
}

// --- INPUT HANDLERS ---
keyboard.addEventListener('mousedown',e=>{
  if(!e.target.classList.contains('key')) return;
  start(+e.target.dataset.offset, document.getElementById('temperament').value);
});
keyboard.addEventListener('mouseup',e=>{
  if(!e.target.classList.contains('key')) return;
  stop(+e.target.dataset.offset);
});

window.addEventListener('keydown',e=>{
  const i=keyMap.indexOf(e.key); 
  const temperament=document.getElementById('temperament').value;
  if(0<=i && i<=12 && !keysDown.has(e.key)){ 
    keysDown.add(e.key); 
    start(i,temperament); 
  }
  if(i>=13 && !chordsDown.has(e.key)){
    chordsDown.add(e.key);
    const overlay = document.querySelector(".overlay");
    overlay.style.width = '9%';
    switch (i) {
      case 13: start(-12,temperament);start(-5,temperament);start(0,temperament);start(4,temperament); overlay.style.left = '6%'; break;
      case 14: start(-8,temperament);start(-2,temperament);start(0,temperament);start(7,temperament); overlay.style.left = '16%'; break;
      case 15: start(-7,temperament);start(-3,temperament);start(0,temperament);start(5,temperament); overlay.style.left = '27%'; break;
      case 16: start(-10,temperament);start(-3,temperament);start(2,temperament);start(5,temperament); overlay.style.left = '38%'; break;
      case 17: start(-3,temperament);start(0,temperament);start(4,temperament);start(9,temperament); overlay.style.left = '48%'; break;
      case 18: start(-6,temperament);start(-3,temperament);start(3,temperament);start(12,temperament); overlay.style.left = '59%'; break;
      case 19: start(-5,temperament);start(2,temperament);start(11,temperament); overlay.style.left = '69.5%'; break;
      case 20: start(-17,temperament);start(-5,temperament);start(5,temperament);start(11,temperament); overlay.style.left = '80%'; break;
      case 21: start(-12,temperament);start(-5,temperament);start(4,temperament);start(12,temperament); overlay.style.left = '89%'; break;
    }
  }
});

window.addEventListener('keyup',e=>{
  const i=keyMap.indexOf(e.key); 
  if(0<=i && i<=12){ keysDown.delete(e.key); stop(i); }
  if(i>=13){
    document.querySelector(".overlay").style.width = '0%';
    chordsDown.delete(e.key);
    switch (i) {
      case 13: stop(-12);stop(-5);stop(0);stop(4); break;
      case 14: stop(-8);stop(-2);stop(0);stop(7); break;
      case 15: stop(-7);stop(-3);stop(0);stop(5); break;
      case 16: stop(-10);stop(-3);stop(2);stop(5); break;
      case 17: stop(-3);stop(0);stop(4);stop(9); break;
      case 18: stop(-6);stop(-3);stop(3);stop(12); break;
      case 19: stop(-5);stop(2);stop(11); break;
      case 20: stop(-17);stop(-5);stop(5);stop(11); break;
      case 21: stop(-12);stop(-5);stop(4);stop(12); break;
    }
  }
});

// --- MIDI ---
if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then(onMIDISuccess, () => console.log("MIDI Access Denied"));
}
function onMIDISuccess(midiAccess) {
  for (let input of midiAccess.inputs.values()) input.onmidimessage = getMIDIMessage;
}
function getMIDIMessage(message) {
  const cmd = message.data[0], note = message.data[1], vel = message.data[2];
  const offset = note - 60;
  if (cmd === 144 && vel > 0) start(offset, document.getElementById('temperament').value);
  else if (cmd === 128 || (cmd === 144 && vel === 0)) stop(offset);
}

// --- UI INTERACTIONS ---

// Frequency Box
document.getElementById("frequencyStart").addEventListener("click", () => {
  const num = parseFloat(document.getElementById("frequencyInput").value);
  if (!isNaN(num)) { start(num,'frequency'); frequencies.push(num); }
});
document.getElementById("frequencyStop").addEventListener("click", () => {
  if (frequencies.length > 0) stop(frequencies.shift());
});

// Toggle Chorale
const choraleBtn = document.getElementById('toggleChorale');
const choraleContainer = document.getElementById('choraleContainer');
choraleBtn.addEventListener('click', () => {
  if (choraleContainer.style.display === 'none') {
    choraleContainer.style.display = 'block';
    choraleBtn.textContent = 'Hide Chorale Image';
  } else {
    choraleContainer.style.display = 'none';
    choraleBtn.textContent = 'Show Chorale Image';
  }
});

// Overtone Presets
const presetValues = {
  default: [1, 0.5, 0.33, 0.25, 0.2, 0.17, 0.15, 0.13],
  pure: [1, 0, 0, 0, 0, 0, 0, 0],
  clarinet: [1, 0, 0.5, 0, 0.25, 0, 0.1, 0], // Focus on odd harmonics
  organ: [1, 0.8, 0.6, 0.8, 0.4, 0.3, 0.2, 0.5] // Rich, heavier on octaves and fifths
};

const presetSelect = document.getElementById('presetSelect');
presetSelect.addEventListener('change', (e) => {
  if (e.target.value === 'custom') return;
  const vals = presetValues[e.target.value];
  overtoneIDs.forEach((id, index) => {
    document.getElementById(id).value = vals[index];
  });
});

// Auto-switch to "Custom" if a slider is moved manually
overtoneIDs.forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    presetSelect.value = 'custom';
  });
});

// Init
window.onload = createKeyboard;
</script>
</body>
</html>
