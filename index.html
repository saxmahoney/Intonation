<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Intonation, Overtones & Waveform</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: sans-serif;
    background:#222; color:#eee;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; margin:0;
    padding: 30px 20px;
  }
  
  /* Waveform Display Styles */
  .canvas-container.hidden {
	display: none;
  }
  .canvas-container.hidden + .keyboard {
	border-top: 2px solid #444;
	border-radius: 8px;
  }
  .canvas-container {
    width: 100%;
    max-width: 930px;
    height: 150px;
    background: #111;
    border: 2px solid #444;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    display: flex;
  }
  #waveformCanvas {
    width: 100%;
    height: 100%;
  }

  .keyboard { 
    position:relative; 
    display:flex; 
    align-items: flex-start;
    background: #000;
    margin-bottom: 30px;
    border: 2px solid #444;
    border-radius: 0 0 8px 8px;
  }

  .dashboard {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 930px; 
    background: #333;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    padding: 0 20px;
  }
  .panel:not(:last-child) {
    border-right: 1px solid #555;
  }
  .panel h3 { margin: 0; font-size: 1.1em; color: #aaa; text-transform: uppercase; }
  
  input[type="text"] { font-size: 1em; width: 100%; padding: 6px; text-align: center; }
  select, button { font-size: 1em; padding: 6px; cursor: pointer; width: 100%; }
  .btn-group { display: flex; gap: 10px; }
  .btn-group button { flex: 1; margin: 0; }
  
  .slider-group { display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
  .slider-group input { flex: 1; }
  
  .overtone-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 15px;
    row-gap: 6px;
  }

  .key.white {
    width:60px; height:220px;
    background:#fff; border:0.5px solid #000; border-radius:0 0 6px 6px;
    display:flex; justify-content:center; align-items:flex-end; font-size:12px;
    cursor:pointer; user-select:none; color:#000;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .key.white.pressed { background:#ddd; }
  .key.black {
    position:absolute; width:40px; height:140px;
    background:#000; border-radius:0 0 4px 4px; color:#eee;
    z-index:2; cursor:pointer; user-select:none;
    display:flex; justify-content:center; align-items:flex-end; font-size:12px;
    border: 1px solid #333;
  }
  .key.black.pressed { background:#444; }
  .key-label { pointer-events: none; padding-bottom: 10px; text-align: center; }
  
  .image-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    margin-top: 10px;
  }
  .image-container img {
    width: 100%;
    display: block;
  }
  .overlay {
    position: absolute;
    top: 0%;   
    left: 6%;  
    width: 0%; 
    height: 100%;
    background: rgba(255,255,0,0.4);
  }
</style>
</head>
<body>

<div id="waveformContainer" class="canvas-container">
  <canvas id="waveformCanvas"></canvas>
</div>
<div id="keyboard" class="keyboard"></div>

<div class="dashboard">
  <div class="panel">
    <h3>UI Options</h3>
    <button id="toggleChorale">Show Chorale Image</button>
    <button id="toggleThirdContainer">Show Major Third Slider</button>
    <button id="toggleWaveform">Hide Waveform</button>
  </div>

  <div class="panel">
    <h3>Note Settings</h3>
    <select id="wave">
      <option value="sine">Sine Wave</option>
      <option value="triangle">Triangle Wave</option>
      <option value="sawtooth">Sawtooth Wave</option>
      <option value="square">Square Wave</option>
    </select>
    <select id="temperament">
      <option value="equal">Equal Temperament</option>
      <option value="just">Just Intonation</option>
      <option value="meantone">Meantone Temperament</option>
      <option value="pythagorean">Pythagorean Intonation</option>
    </select>
	Manual Frequency:
    <input type="text" id="frequencyInput" placeholder="Enter frequency (Hz)">
    <div class="btn-group">
      <button id="frequencyStart">Start</button>
      <button id="frequencyStop">Stop</button>
    </div>
  </div>

  <div class="panel">
    <h3>Harmonic Mix</h3>
    <div class="slider-group">
      <label>Vol:</label>
      <input type="range" id="gainSel" min="0" max=".5" step="0.01" value=".25">
    </div>
    <select id="presetSelect">
      <option value="pure">Pure (1f only)</option>
	  <option value="default">Default Mix</option>
	  <option value="clarinet">Clarinet (Odd harmonics)</option>
      <option value="organ">Drawbar Organ</option>
      <option value="phantom">Phantom Fundamental</option>
      <option value="vowel_ah">Vowel Ah</option>
      <option value="vowel_oo">Vowel Oo</option>
      <option value="vowel_ee">Vowel Ee</option>
      <option value="bell">Bell</option>
      <option value="custom">Custom</option>
    </select>
    
    <div class="overtone-grid">
      <div class="slider-group"><label>1f:</label> <input type="range" id="f1" min="0" max="1" step="0.01" value="1"></div>
      <div class="slider-group"><label>5f:</label> <input type="range" id="f5" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-group"><label>2f:</label> <input type="range" id="f2" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-group"><label>6f:</label> <input type="range" id="f6" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-group"><label>3f:</label> <input type="range" id="f3" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-group"><label>7f:</label> <input type="range" id="f7" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-group"><label>4f:</label> <input type="range" id="f4" min="0" max="1" step="0.01" value="0"></div>
      <div class="slider-group"><label>8f:</label> <input type="range" id="f8" min="0" max="1" step="0.01" value="0"></div>
    </div>
  </div>
</div>

<div class="image-container" id="choraleContainer" style="display: none;">
  <img src="chorale.jpg" alt="Background">
  <div class="overlay"></div>
</div>

<div id="thirdContainer" class="panel" style="width: 100%; max-width: 930px; margin: 20px auto; background: #333; padding: 20px; border-radius: 8px; box-sizing: border-box; display: none;">
  <h3>Where's the 3rd?</h3>
  <div id="ratioDisplay" style="font-family: monospace; color: #44ff44; font-size: 2.2em; display: none;">Ratio: 1.2500</div>
  <div style="position: relative; width: 100%; height: 25px; margin-bottom: 5px;">
    <div id="markers" style="position: absolute; width: calc(100% - 70px); left: 35px; height: 100%; display: none"></div>
  </div>

  <div class="slider-group" style="display: flex; align-items: center; gap: 15px; width: 100%;">
    <span>Eb4</span>
    <input type="range" id="triadSlider" min="0" max="1" step="0.0001" value="0.5" style="flex-grow: 1;">
    <span>F4</span>
  </div>
  
  <div class="btn-group" style="margin-top: 15px; display: flex; gap: 10px;">
    <button id="triadToggle">Play Trio</button>
    <button id="nudgeDown">-1 Cent</button>
    <button id="nudgeUp">+1 Cent</button>
    <button id="toggleMarkers">Show Markers</button>
  </div>
</div>

<script>
const AudioContext = window.AudioContext||window.webkitAudioContext;
const ctx = new AudioContext();

// --- ANALYSER SETUP ---
const canvas = document.getElementById('waveformCanvas');
const canvasCtx = canvas.getContext('2d');
const analyser = ctx.createAnalyser();
analyser.fftSize = 2048;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);
analyser.connect(ctx.destination);

const baseFreq = 261.63; // C4
const keyMap = ['z','s','x','d','c','v','g','b','h','n','j','m',',','q','w','e','r','t','y','u','i','o'];
const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const keyboard = document.getElementById('keyboard');
const active = new Map();
const keysDown = new Set();
const chordsDown = new Set();
let manualFrequencies = [];

// --- CONSTANTS FOR TRIO ---
const LOW_LIMIT = baseFreq * 1.185185185; // Pyth Eb4
const HIGH_LIMIT = baseFreq * 1.337;      // Meantone F4
const FIXED_C = baseFreq;
const FIXED_G = baseFreq * 1.5;           // Just G
const CENT_RATIO = Math.pow(2, 1/1200);   // 1 Cent ratio

// --- KEYBOARD GENERATION ---
function octave(o) {
  let q = Math.floor(o / 12);
  let r = o - 12 * q;
  if (r < 0) { r += 12; q -= 1; }
  return { quotient: q, remainder: r };
}

function createKeyboard() {
  keyboard.innerHTML = '';
  const whiteOrder = [0, 2, 4, 5, 7, 9, 11];
  for (let offset = -12; offset <= 12; offset++) {
    const { remainder } = octave(offset);
    if (whiteOrder.includes(remainder)) {
      const div = document.createElement('div');
      div.className = 'key white';
      div.dataset.offset = offset;
      const label = (offset >= 0 && offset <= 12) ? keyMap[offset].toUpperCase() : '';
      div.innerHTML = `<div class="key-label"><div style="font-size:11px">${label}</div><div style="font-size:16px; font-weight:bold">${noteNames[remainder]}</div></div>`;
      keyboard.appendChild(div);
    }
  }
  const whiteKeyElements = document.querySelectorAll('.key.white');
  const whiteKeyWidth = whiteKeyElements[0].getBoundingClientRect().width;
  let whiteKeyIndex = 0;
  for (let offset = -12; offset <= 11; offset++) {
    const { remainder } = octave(offset);
    if (whiteOrder.includes(remainder)) {
      whiteKeyIndex++;
    } else {
      const div = document.createElement('div');
      div.className = 'key black';
      div.dataset.offset = offset;
      const exactLeft = (whiteKeyIndex * whiteKeyWidth) - 20;
      div.style.left = exactLeft + 'px';
      const label = (offset >= 0 && offset <= 12) ? keyMap[offset].toUpperCase() : '';
      div.innerHTML = `<div class="key-label"><div style="font-size:11px">${label}</div><div style="font-size:16px; font-weight:bold">${noteNames[remainder]}</div></div>`;
      keyboard.appendChild(div);
    }
  }
}

// --- AUDIO LOGIC ---
function freq(offset, temperament){
  const {quotient, remainder} = octave(offset);
  switch (temperament) {
    case 'equal': return baseFreq*Math.pow(2,offset/12); 
    case 'meantone':
      const meantoneRatios = [1, 1.070, 1.118, 1.196, 1.250, 1.337, 1.398, 1.495, 1.600, 1.672, 1.789, 1.869, 2.000];
      return baseFreq*meantoneRatios[remainder]*Math.pow(2,quotient);
    case 'just':
      const justRatios = [1,1.042, 1.125, 1.200, 1.250, 1.333, 1.406, 1.500, 1.600, 1.667, 1.800, 1.875, 2.000];
      return baseFreq*justRatios[remainder]*Math.pow(2,quotient);
    case 'pythagorean':
      const pythRatios = [1, 1.053497942, 1.125, 1.185185185, 1.265625, 1.333333333, 1.423828125, 1.5, 1.580246914, 1.6875, 1.777777778, 1.8984375, 2.0];
      return baseFreq*pythRatios[remainder]*Math.pow(2,quotient);
    case 'frequency': return offset;
  }
}

const overtoneIDs = ['f1','f2','f3','f4','f5','f6','f7','f8'];
const ATTACK=0.01, RELEASE=0.25;

function start(o, temperament){
  if(active.has(o)) return;
  if(ctx.state==='suspended') ctx.resume();
  let g = ctx.createGain();
  const overtoneAmps = overtoneIDs.map(id => Number(document.getElementById(id).value));
  const master = parseFloat(document.getElementById('gainSel').value);
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(master,ctx.currentTime+ATTACK);
  const oscillators = [];
  const fundamental = freq(o, temperament);
  console.log(fundamental);
  for (const [i, relGain] of overtoneAmps.entries()) {
    const osc = ctx.createOscillator();
    osc.type = document.getElementById('wave').value;
    osc.frequency.value = (i+1) * fundamental;
    const og = ctx.createGain();
    og.gain.value = relGain;
    osc.connect(og).connect(g);
    osc.start();
    oscillators.push({osc,og});
  }
  // Connect to Analyser instead of destination directly
  g.connect(analyser);
  active.set(o,{oscillators,g});
  press(o,true);
}

function stop(o) {
  const n = active.get(o);
  if (!n) return;
  const t = ctx.currentTime;
  n.g.gain.cancelScheduledValues(t);
  n.g.gain.setValueAtTime(n.g.gain.value, t);
  n.g.gain.linearRampToValueAtTime(0, t + RELEASE);
  n.oscillators.forEach(({ osc }) => osc.stop(t + RELEASE + 0.02));
  setTimeout(() => {
    try {
      n.oscillators.forEach(({ osc, og }) => { osc.disconnect(); og.disconnect(); });
      n.g.disconnect();
    } catch (e) {}
  }, (RELEASE + 0.1) * 1000);
  active.delete(o);
  press(o, false);
}

function press(o,on){
  document.querySelectorAll(`.key[data-offset="${o}"]`).forEach(el=>el.classList.toggle('pressed',on));
}

function draw() {
  if (!waveformVisible) return;

  requestAnimationFrame(draw);

  // 1. Setup Canvas
  if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  canvasCtx.fillStyle = '#111';
  canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

  if (active.size === 0) return;

  const lowestFreq = 130.815; // C3
  
  // We want to show exactly 2 full cycles of the lowest note
  const totalTimeDisplayed = 4 / lowestFreq; 


  const waveType = document.getElementById('wave').value;
  const overtoneAmps = overtoneIDs.map(id => Number(document.getElementById(id).value));
  const volSlider = document.getElementById('gainSel').value;

  active.forEach((noteData, offset) => {
    let f0 = freq(offset, document.getElementById('temperament').value);
    if (offset > 26) {
      f0 = offset;
    }
    canvasCtx.beginPath();
    canvasCtx.lineWidth = 1;
    canvasCtx.strokeStyle = 'rgba(68, 255, 255, 0.33)';
    for (let x = 0; x < canvas.width; x++) {
      const t = (x / canvas.width) * totalTimeDisplayed;
      let ySingle = 0;
      // sum overtones for this note
      overtoneAmps.forEach((amp, i) => {
        if (amp <= 0) return;
        const f = f0 * (i + 1);
        // Pure math-based wave generation
        if (waveType === 'sine') {
          ySingle += amp * Math.sin(2 * Math.PI * f * t + Math.PI/2);
        } else if (waveType === 'square') {
          ySingle += amp * (Math.sin(2 * Math.PI * f * t + Math.PI/2) >= 0 ? 1 : -1);
        } else if (waveType === 'triangle') {
          ySingle += amp * (2 / Math.PI) * Math.asin(Math.sin(2 * Math.PI * f * t + Math.PI/2));
        } else if (waveType === 'sawtooth') {
          ySingle += amp * (1 - 2 * ((t * f) % 1));
        }
      });
      const y = (canvas.height / 2) - (ySingle * 50 * volSlider); // 50 is a scale factor
      if (x === 0) canvasCtx.moveTo(x, y);
      else canvasCtx.lineTo(x, y);
    }
    canvasCtx.stroke();
  });

  // 3. Draw the combined wave
  canvasCtx.lineWidth = 1.5;
  canvasCtx.strokeStyle = '#44ff44';
  canvasCtx.beginPath();
  for (let x = 0; x < canvas.width; x++) {
    const t = (x / canvas.width) * totalTimeDisplayed;
    let ySum = 0;
    // Sum up every active note
    active.forEach((noteData, offset) => {
      let f0 = freq(offset, document.getElementById('temperament').value);
	  if (offset > 26) {
		f0 = offset;
	  }
      
      // Sum up every overtone for this note
      overtoneAmps.forEach((amp, i) => {
        if (amp <= 0) return;
        const f = f0 * (i + 1);
        
        // Pure math-based wave generation
        if (waveType === 'sine') {
          ySum += amp * Math.sin(2 * Math.PI * f * t + Math.PI/2);
        } else if (waveType === 'square') {
          ySum += amp * (Math.sin(2 * Math.PI * f * t + Math.PI/2) >= 0 ? 1 : -1);
        } else if (waveType === 'triangle') {
          ySum += amp * (2 / Math.PI) * Math.asin(Math.sin(2 * Math.PI * f * t + Math.PI/2));
        } else if (waveType === 'sawtooth') {
          ySum += amp * (1 - 2 * ((t * f) % 1));
        }
      });
    });

    // Normalize and Draw
    const yPos = (canvas.height / 2) - (ySum * 50 * volSlider); // 50 is a scale factor
    if (x === 0) canvasCtx.moveTo(x, yPos);
    else canvasCtx.lineTo(x, yPos);
  }
  canvasCtx.stroke();
}

// --- DYNAMIC SLIDER LOGIC ---
let triadActive = false;
let currentSliderFreq = 0;
const triadNotes = new Set();
const triadToggleBtn = document.getElementById('triadToggle');
const triadSlider = document.getElementById('triadSlider');
const ratioDisplay = document.getElementById('ratioDisplay');

function stopTriadNotes() {
    triadNotes.forEach(freqVal => stop(freqVal));
    triadNotes.clear();
    triadActive = false;
    triadToggleBtn.textContent = 'Play Trio';
}

function updateSliderPitch(manualFreq = null) {
    if (manualFreq === null) {
        const x = parseFloat(triadSlider.value);
        currentSliderFreq = LOW_LIMIT * Math.pow((HIGH_LIMIT / LOW_LIMIT), x);
    } else {
        currentSliderFreq = manualFreq;
    }

	// Update ratio text display
    const currentRatio = (currentSliderFreq / baseFreq).toFixed(4);
    ratioDisplay.textContent = `Ratio: ${currentRatio}`;

    if (!triadActive) return;

    for (let note of triadNotes) {
        if (note !== FIXED_C && note !== FIXED_G) {
            stop(note);
            triadNotes.delete(note);
        }
    }
    start(currentSliderFreq, 'frequency');
    triadNotes.add(currentSliderFreq);
}

triadToggleBtn.addEventListener('click', () => {
    if (!triadActive) {
        triadActive = true;
        triadToggleBtn.textContent = 'Stop Trio';
        start(FIXED_C, 'frequency');
        triadNotes.add(FIXED_C);
        start(FIXED_G, 'frequency');
        triadNotes.add(FIXED_G);
        updateSliderPitch();
    } else {
        stopTriadNotes();
    }
});

triadSlider.addEventListener('input', () => {
    if (triadActive) updateSliderPitch();
});

document.getElementById('nudgeUp').addEventListener('click', () => {
    if (triadActive) updateSliderPitch(currentSliderFreq * CENT_RATIO);
});

document.getElementById('nudgeDown').addEventListener('click', () => {
    if (triadActive) updateSliderPitch(currentSliderFreq / CENT_RATIO);
});

function createMarkers() {
  const container = document.getElementById('markers');
  container.innerHTML = '';
  const systems = [
    { name: 'Equal', ratio: Math.pow(2, 4/12), color: '#ff4444' }, 
    { name: 'Just/Mean', ratio: 1.250, color: '#44ff44' },            
    { name: 'Pyth', ratio: 1.265625, color: '#ffff44' }         
  ];
  systems.forEach(sys => {
    const freqE = baseFreq * sys.ratio;
    const x = Math.log(freqE / LOW_LIMIT) / Math.log(HIGH_LIMIT / LOW_LIMIT);
    if (x >= 0 && x <= 1) {
        const marker = document.createElement('div');
        marker.style.position = 'absolute';
        marker.style.left = (x * 100) + '%';
        marker.style.bottom = '0';
        marker.style.width = '2px';
        marker.style.height = '10px';
        marker.style.background = sys.color;
        const label = document.createElement('div');
        label.innerText = sys.name;
        label.style.position = 'absolute';
        label.style.bottom = '12px';
        label.style.left = '4px';
		label.style.transformOrigin = 'bottom left';
        label.style.transform = 'rotate(-45deg)';
        label.style.fontSize = '20px';
        label.style.color = sys.color;
		label.style.whiteSpace = 'nowrap';
        marker.appendChild(label);
        container.appendChild(marker);
    }
  });
}

const toggleMarkersBtn = document.getElementById('toggleMarkers');
const markersContainer = document.getElementById('markers');
toggleMarkersBtn.addEventListener('click', () => {
    if (markersContainer.style.display === 'none') {
        markersContainer.style.display = 'block';
		ratioDisplay.style.display = 'block';
        toggleMarkersBtn.textContent = 'Hide Markers';
    } else {
        markersContainer.style.display = 'none';
		ratioDisplay.style.display = 'none';
        toggleMarkersBtn.textContent = 'Show Markers';
    }
});

const toggleWaveformBtn = document.getElementById('toggleWaveform');
const waveformContainer = document.getElementById('waveformContainer');
let waveformVisible = true;

toggleWaveformBtn.addEventListener('click', () => {
	waveformVisible = !waveformVisible;
  if (waveformVisible) {
    waveformContainer.classList.remove('hidden');
    toggleWaveformBtn.textContent = 'Hide Waveform';
    // Restart the draw loop if it was stopped
    draw(); 
  } else {
    waveformContainer.classList.add('hidden');
    toggleWaveformBtn.textContent = 'Show Waveform';
  }
});

// --- KEYBOARD & GENERAL UI ---
keyboard.addEventListener('mousedown',e=>{
  if(!e.target.classList.contains('key')) return;
  start(+e.target.dataset.offset, document.getElementById('temperament').value);
});
keyboard.addEventListener('mouseup',e=>{
  if(!e.target.classList.contains('key')) return;
  stop(+e.target.dataset.offset);
});

window.addEventListener('keydown',e=>{
  const i=keyMap.indexOf(e.key); 
  const temperament=document.getElementById('temperament').value;
  if(0<=i && i<=12 && !keysDown.has(e.key)){ keysDown.add(e.key); start(i,temperament); }
  if(i>=13 && !chordsDown.has(e.key)){
    chordsDown.add(e.key);
    const overlay = document.querySelector(".overlay");
	overlay.style.width = '9%';
    switch (i) {
      case 13: start(-12,temperament);start(-5,temperament);start(0,temperament);start(4,temperament); overlay.style.left = '6%'; break;
      case 14: start(-8,temperament);start(-2,temperament);start(0,temperament);start(7,temperament); overlay.style.left = '16%'; break;
      case 15: start(-7,temperament);start(-3,temperament);start(0,temperament);start(5,temperament); overlay.style.left = '27%'; break;
      case 16: start(-10,temperament);start(-3,temperament);start(2,temperament);start(5,temperament); overlay.style.left = '38%'; break;
      case 17: start(-3,temperament);start(0,temperament);start(4,temperament);start(9,temperament); overlay.style.left = '48%'; break;
      case 18: start(-6,temperament);start(-3,temperament);start(3,temperament);start(12,temperament); overlay.style.left = '59%'; break;
      case 19: start(-5,temperament);start(2,temperament);start(11,temperament); overlay.style.left = '69.5%'; break;
      case 20: start(-17,temperament);start(-5,temperament);start(5,temperament);start(11,temperament); overlay.style.left = '80%'; break;
      case 21: start(-12,temperament);start(-5,temperament);start(4,temperament);start(12,temperament); overlay.style.left = '89%'; break;
    }
  }
});

window.addEventListener('keyup',e=>{
  const i=keyMap.indexOf(e.key); 
  if(0<=i && i<=12){ keysDown.delete(e.key); stop(i); }
  if(i>=13){
    const choraleOverlay = document.querySelector(".overlay");
    if(choraleOverlay) choraleOverlay.style.width = '0%';
    chordsDown.delete(e.key);
    switch (i) {
      case 13: stop(-12);stop(-5);stop(0);stop(4); break;
      case 14: stop(-8);stop(-2);stop(0);stop(7); break;
      case 15: stop(-7);stop(-3);stop(0);stop(5); break;
      case 16: stop(-10);stop(-3);stop(2);stop(5); break;
      case 17: stop(-3);stop(0);stop(4);stop(9); break;
      case 18: stop(-6);stop(-3);stop(3);stop(12); break;
      case 19: stop(-5);stop(2);stop(11); break;
      case 20: stop(-17);stop(-5);stop(5);stop(11); break;
      case 21: stop(-12);stop(-5);stop(4);stop(12); break;
    }
  }
});

document.getElementById("frequencyStart").addEventListener("click", () => {
  const num = parseFloat(document.getElementById("frequencyInput").value);
  if (!isNaN(num)) { start(num,'frequency'); manualFrequencies.push(num); }
});
document.getElementById("frequencyStop").addEventListener("click", () => {
  if (manualFrequencies.length > 0) stop(manualFrequencies.shift());
});

const thirdBtn = document.getElementById('toggleThirdContainer');
const thirdContainer = document.getElementById('thirdContainer');
thirdBtn.addEventListener('click', () => {

const presetValues = {
  default: [1, 0.5, 0.33, 0.25, 0.2, 0.17, 0.15, 0.13],
  pure: [1, 0, 0, 0, 0, 0, 0, 0],
  clarinet: [1, 0, 0.5, 0, 0.25, 0, 0.1, 0], 
  organ: [1, 0.8, 0.6, 0.8, 0.4, 0.3, 0.2, 0.5], 
  phantom: [0, 1.0, 0.75, 0.5, 0.4, 0.3, 0.2, 0.15],
  vowel_ah: [0.8, 1.0, 0.9, 0.5, 0.2, 0, 0, 0],
  vowel_oo: [1.0, 0.4, 0.1, 0, 0, 0, 0, 0],
  vowel_ee: [1.0, 0.2, 0.1, 0.1, 0.4, 0.7, 1.0, 0.8],
  bell: [1.0, 0.3, 0.3, 0.0, 0.0, 0.0, 0.8, 0.2],
};

document.getElementById('presetSelect').addEventListener('change', (e) => {
  if (e.target.value === 'custom') return;
  const vals = presetValues[e.target.value];
  overtoneIDs.forEach((id, index) => { document.getElementById(id).value = vals[index]; });
});

window.onload = function() { 
  createKeyboard(); 
  createMarkers(); 
  draw(); // Kick off waveform animation
}

// --- MIDI FUNCTIONALITY ---
function onMIDISuccess(midiAccess) {
  const inputs = midiAccess.inputs.values();
  for (let input of inputs) {
    input.onmidimessage = getMIDIMessage;
  }
}

function getMIDIMessage(message) {
  const command = message.data[0];
  const note = message.data[1];
  const velocity = (message.data.length > 2) ? message.data[2] : 0;
  const offset = note - 60;
  const temperament = document.getElementById('temperament').value;

  switch (command) {
    case 144: if (velocity > 0) start(offset, temperament); else stop(offset); break;
    case 128: stop(offset); break;
  }
}

if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess().then(onMIDISuccess, () => console.error("MIDI access failed."));
}
